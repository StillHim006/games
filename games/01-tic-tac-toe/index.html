<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | GamerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css"> <!-- Global styles -->
    <link rel="stylesheet" href="style.css"> <!-- Game specific -->
</head>

<body class="game-page">
    <div class="bg-glow"></div>

    <header>
        <div class="container">
            <div class="header-nav">
                <div class="nav-controls" style="display:flex; gap:10px;">
                    <button id="fullscreen-btn" class="fullscreen-btn">⛶ Full Screen</button>
                    <a href="../../index.html" class="back-link">← Hub</a>
                </div>
                <div class="logo-mini">
                    <h1>TICTAC<span>TOE</span></h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container">
            <div class="status-panel">
                <div class="player-info player-x active" id="player-x">
                    <span class="symbol">X</span>
                    <span class="label">Player 1</span>
                </div>
                <div class="vs">VS</div>
                <div class="player-info player-o" id="player-o">
                    <span class="symbol">O</span>
                    <span class="label">Player 2</span>
                </div>
            </div>

            <div id="board" class="board">
                <!-- 9 Cells generated by JS -->
            </div>

            <div class="message-area" id="status-msg">
                Your Turn, Player X
            </div>

            <div class="controls">
                <button id="reset-btn" class="play-btn">Restart Game</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
