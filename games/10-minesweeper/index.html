<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Mine | GamerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
    <div class="bg-glow"></div>

    <header>
        <div class="container">
            <div class="header-nav">
                <div class="nav-controls" style="display:flex; gap:10px;">
                    <button id="fullscreen-btn" class="fullscreen-btn">⛶ Full Screen</button>
                    <a href="../../index.html" class="back-link">← Hub</a>
                </div>
                <div class="logo-mini">
                    <h1>CYBER<span>MINE</span></h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container">
            <div class="stats-panel">
                <div class="stat">
                    <span class="label">Mines</span>
                    <span id="mine-count" class="value">10</span>
                </div>
                <div class="stat">
                    <span class="label">Status</span>
                    <span id="game-status" class="value">SECURE</span>
                </div>
            </div>

            <div class="grid-wrapper">
                <div id="mine-grid" class="mine-grid">
                    <!-- 10x10 Grid generated by JS -->
                </div>
            </div>

            <div class="controls-info">
                <p><b>Left Click</b> to reveal, <b>Right Click</b> to flag potential mines</p>
                <button id="reset-btn" class="play-btn">Re-Scan Grid</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
