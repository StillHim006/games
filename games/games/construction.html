<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | GamerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <style>
        .construction-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 50px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            backdrop-filter: blur(15px);
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px var(--primary));
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 15px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="construction-container">
        <span class="icon">🚧</span>
        <h1>SYSTEM OFFLINE</h1>
        <p>This sector of the GamerHub is currently under maintenance. Our engineers are working hard to bring it online
            soon!</p>
        <a href="../../index.html" class="play-btn">Back to Control Center</a>
    </div>
</body>

</html>
