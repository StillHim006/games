<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Bug | GamerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
    <div class="bg-glow"></div>

    <header>
        <div class="container">
            <div class="header-nav">
                <div class="nav-controls" style="display:flex; gap:10px;">
                    <button id="fullscreen-btn" class="fullscreen-btn">⛶ Full Screen</button>
                    <a href="../../index.html" class="back-link">← Hub</a>
                </div>
                <div class="logo-mini">
                    <h1>WHACK-A-<span>BUG</span></h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container">
            <div class="stats-panel">
                <div class="stat">
                    <span class="label">Bugs Squashed</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Level</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="stat">
                    <span class="label">Time Left</span>
                    <span id="timer" class="value">30s</span>
                </div>
            </div>

            <div class="whack-grid" id="bug-grid">
                <!-- 9 Holes generated by JS -->
            </div>

            <div class="controls-info">
                <p>Click the <b>System Bugs</b> as they appear to fix the GamerHub!</p>
                <button id="reset-btn" class="play-btn">Launch Bug Sweep</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
