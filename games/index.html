<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium collection of high-quality web games. Play Tic-Tac-Toe, Snake, Minesweeper, and more!">
    <title>GamerHub | Premium Web Games Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <h1>GAMER<span>HUB</span></h1>
            </div>
            <p class="subtitle">Premium Games Experience</p>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h2>Select Your Adventure</h2>
            <p>Dive into our curated collection of classic and modern games.</p>
        </section>

        <div id="game-grid" class="game-grid">
            <!-- Games will be dynamically injected here -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 GamerHub Premium. Crafted with Passion.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
