<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match | GamerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
    <div class="bg-glow"></div>

    <header>
        <div class="container">
            <div class="header-nav">
                <div class="nav-controls" style="display:flex; gap:10px;">
                    <button id="fullscreen-btn" class="fullscreen-btn">⛶ Full Screen</button>
                    <a href="../../index.html" class="back-link">← Hub</a>
                </div>
                <div class="logo-mini">
                    <h1>MEMORY<span>MATCH</span></h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="game-container">
            <div class="stats-panel">
                <div class="stat">
                    <span class="label">Moves</span>
                    <span id="moves" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Time</span>
                    <span id="timer" class="value">00:00</span>
                </div>
                <div class="stat">
                    <span class="label">Pairs</span>
                    <span id="pairs" class="value">0/8</span>
                </div>
            </div>

            <div id="memory-grid" class="memory-grid">
                <!-- 16 Cards generated by JS -->
            </div>

            <div class="controls">
                <button id="reset-btn" class="play-btn">Restart Matrix</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
